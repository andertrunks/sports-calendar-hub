name: Update calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5,11,17 * * *"
      timezone: "America/Sao_Paulo"

permissions:
  contents: write

concurrency:
  group: sports-calendar-sync
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Synchronize Sheet, ICS and Google Calendar
        env:
          SPORTS_GATEWAY_URL: ${{ secrets.SPORTS_GATEWAY_URL }}
          SPORTS_EXPORT_TOKEN: ${{ secrets.SPORTS_EXPORT_TOKEN }}
          SPORTS_SYNC_TOKEN: ${{ secrets.SPORTS_SYNC_TOKEN }}
        run: python -m src.remote_sync

      - name: Validate ICS feeds
        run: python -m src.validate_ics

      - name: Scan generated files for private data
        run: python -m src.privacy_scan

      - name: Commit real changes only
        shell: bash
        run: |
          if git diff --quiet -- data/events.json docs reports; then
            echo "No synchronized calendar changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json docs reports
          git commit -m "chore(calendar): update generated ICS feeds"
          git push origin HEAD:main
