name: Update calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,12,18 * * *"
      timezone: "America/Sao_Paulo"

permissions:
  contents: write

concurrency:
  group: update-calendars-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Generate calendars and index
        run: python -m src.main

      - name: Validate ICS feeds
        run: python -m src.validate_ics

      - name: Commit real changes only
        shell: bash
        run: |
          if git diff --quiet -- docs; then
            echo "No generated calendar changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore(calendar): update generated ICS feeds"
          git push origin HEAD:main
