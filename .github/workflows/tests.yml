name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Generate calendars
        run: python -m src.main

      - name: Validate ICS feeds
        run: python -m src.validate_ics

      - name: Scan public artifacts for credentials and private data
        run: python -m src.privacy_scan
